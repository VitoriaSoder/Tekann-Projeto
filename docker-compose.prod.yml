version: '3.8'

services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ic-mssql-A7GD
    user: root
    network_mode: host
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sql_data:/var/opt/mssql/data
    restart: unless-stopped

  api:
    build: 
      context: ./API
      dockerfile: Dockerfile
    container_name: tekann-api-prod
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=localhost;Database=TekannDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=tekann-api
      - Jwt__Audience=tekann-app
      - Jwt__ExpirationHours=24
    restart: unless-stopped

  frontend:
    build:
      context: ./React
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: tekann-frontend-prod
    network_mode: host
    # Nota: No modo host, a porta é definida no nginx.conf do container.
    # Vou precisar ajustar o seu nginx.conf para usar a porta 8080.
    restart: unless-stopped

volumes:
  sql_data:

services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tekann-db-dev
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql/data
    restart: unless-stopped

volumes:
  sql_data:

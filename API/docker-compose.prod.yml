version: '3.8'

services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tekann-db-prod
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - sql_data:/var/opt/mssql/data
    restart: unless-stopped
    networks:
      - tekann-network

  api:
    build: 
      context: ./API
      dockerfile: Dockerfile
    container_name: tekann-api-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=database;Database=TekannDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=tekann-api
      - Jwt__Audience=tekann-app
      - Jwt__ExpirationHours=24
    ports:
      - "5000:5000"
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - tekann-network

  frontend:
    build:
      context: ./React
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: tekann-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - tekann-network

volumes:
  sql_data:

networks:
  tekann-network:
    driver: bridge
